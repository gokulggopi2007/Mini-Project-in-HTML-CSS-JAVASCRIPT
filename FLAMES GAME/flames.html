<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLAMES Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .title {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 8px;
      color: #ff6b35;
      text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
      margin-bottom: 6px;
    }

    .fire-icon {
      text-align: center;
      font-size: 42px;
      margin-bottom: 6px;
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {
      0%   { transform: scale(1) rotate(-2deg); }
      100% { transform: scale(1.1) rotate(2deg); }
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.3s, background 0.3s;
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .input-group input:focus {
      border-color: #ff6b35;
      background: rgba(255, 107, 53, 0.08);
    }

    .heart-divider {
      text-align: center;
      font-size: 20px;
      margin: 4px 0 18px;
      color: #e63946;
      animation: heartbeat 1.2s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.25); }
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b35, #e63946);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.35);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(255, 107, 53, 0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .result-box {
      display: none;
      margin-top: 32px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 800;
      color: #ff6b35;
      text-shadow: 0 0 16px rgba(255, 107, 53, 0.6);
      margin-bottom: 24px;
    }

    .flames-strip {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .fl-box {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.4s;
    }

    .fl-box .fl-letter {
      font-size: 17px;
    }

    .fl-box .fl-word {
      font-size: 8px;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.3);
    }

    .fl-box.active {
      background: linear-gradient(135deg, #ff6b35, #e63946);
      border-color: #ff6b35;
      color: #fff;
      transform: scale(1.15);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
    }

    .fl-box.active .fl-word {
      color: rgba(255, 255, 255, 0.85);
    }

    .fl-box.struck .fl-letter {
      text-decoration: line-through;
      opacity: 0.25;
    }

    .count-info {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 8px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 28px 0 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="fire-icon">🔥</div>
    <h1 class="title">FLAMES</h1>
    <p class="subtitle">Friends · Love · Affection · Marriage · Enemy · Siblings</p>

    <div class="input-group">
      <label for="name1">First Name</label>
      <input type="text" id="name1" placeholder="Enter first name" />
    </div>

    <div class="heart-divider">❤️</div>

    <div class="input-group">
      <label for="name2">Second Name</label>
      <input type="text" id="name2" placeholder="Enter second name" />
    </div>

    <button class="btn" onclick="calculate()">Calculate</button>

    <div class="result-box" id="result-box">
      <hr class="divider" />
      <br>
      <p class="result-label">Your relationship is</p>
      <p class="result-value" id="result-value"></p>

      <div class="flames-strip" id="flames-strip"></div>
      <p class="count-info" id="count-info"></p>
    </div>
  </div>

  <script>
    function normalize(str) {
      return str.toLowerCase().replace(/[^a-z]/g, '');
    }

    function remainingCount(a, b) {
      const freq = new Array(26).fill(0);
      for (const c of a) freq[c.charCodeAt(0) - 97]++;
      for (const c of b) freq[c.charCodeAt(0) - 97]--;
      return freq.reduce((sum, v) => sum + Math.abs(v), 0);
    }

    function flamesResult(count) {
      const letters  = ['F', 'L', 'A', 'M', 'E', 'S'];
      const meanings = {
        F: 'Friends', L: 'Love', A: 'Affection',
        M: 'Marriage', E: 'Enemy', S: 'Siblings'
      };
      const emojis = {
        Friends: '🤝', Love: '❤️', Affection: '🥰',
        Marriage: '💍', Enemy: '⚔️', Siblings: '👫'
      };

      if (count === 0) {
        return { letter: 'S', result: 'Siblings', emoji: '👫' };
      }

      let alive = [0, 1, 2, 3, 4, 5];
      let idx = 0;

      while (alive.length > 1) {
        let pos = (idx + count - 1) % alive.length;
        alive.splice(pos, 1);
        idx = pos % alive.length;
      }

      const winLetter = letters[alive[0]];
      const winResult = meanings[winLetter];
      return {
        letter: winLetter,
        result: winResult,
        emoji: emojis[winResult],
        winIndex: alive[0]
      };
    }

    function calculate() {
      const n1 = document.getElementById('name1').value.trim();
      const n2 = document.getElementById('name2').value.trim();

      if (!n1 || !n2) {
        alert('Please enter both names!');
        return;
      }

      const a = normalize(n1);
      const b = normalize(n2);
      const count = remainingCount(a, b);
      const { letter, result, emoji } = flamesResult(count);

      const box = document.getElementById('result-box');
      box.style.display = 'block';
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'fadeIn 0.5s ease';

      document.getElementById('result-value').textContent = emoji + ' ' + result;
      document.getElementById('count-info').textContent =
        'Remaining count after cancellation: ' + count;

      const strip = document.getElementById('flames-strip');
      strip.innerHTML = '';

      const allLetters  = ['F', 'L', 'A', 'M', 'E', 'S'];
      const allWords    = ['Friends', 'Love', 'Affection', 'Marriage', 'Enemy', 'Siblings'];

      allLetters.forEach((l, i) => {
        const box = document.createElement('div');
        box.className = 'fl-box';

        const span = document.createElement('span');
        span.className = 'fl-letter';
        span.textContent = l;

        const word = document.createElement('span');
        word.className = 'fl-word';
        word.textContent = allWords[i];

        box.appendChild(span);
        box.appendChild(word);

        if (l === letter) {
          box.classList.add('active');
        } else {
          box.classList.add('struck');
        }

        strip.appendChild(box);
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') calculate();
    });
  </script>

</body>
</html>
